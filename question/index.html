<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Question</title>
  <style>
    :root {
      --bg: #83d3e2;
      --surface: #ffffff;
      --border: #d8d3c8;
      --text: #111111;
      --muted: #6b6b6b;
      --ok: #0f766e;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      padding: 1rem;
    }

    main {
      width: min(680px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem;
    }

    h1 {
      margin: 0 0 0.45rem;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    label {
      display: block;
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem;
      font: inherit;
      resize: vertical;
    }

    .row {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }

    button,
    a.btn {
      border: 1px solid #111;
      background: #111;
      color: #fff;
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    a.btn.secondary {
      background: transparent;
      color: #111;
    }

    .status {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      min-height: 1.3em;
      word-break: break-word;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--error); }
  </style>
</head>
<body>
  <main>
    <h1>やってみなはれボックス</h1>

    <form id="question-form">
      <label for="message" class="sr-only">質問内容</label>
      <textarea id="message" name="message" required maxlength="1000"></textarea>
      <div class="row">
        <button type="submit">送信</button>
        <a class="btn secondary" href="/smartphone-view">一覧へ戻る</a>
      </div>
    </form>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    const CLIPBOARD_API_URL = 'https://githubio-api.vercel.app/api/v1/clipboards';
    const form = document.getElementById('question-form');
    const messageInput = document.getElementById('message');
    const statusEl = document.getElementById('status');

    const setStatus = (message, kind) => {
      statusEl.textContent = message;
      statusEl.className = `status ${kind || ''}`.trim();
    };

    const parseJsonSafely = async (response) => {
      try {
        return await response.json();
      } catch {
        return null;
      }
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const text = messageInput.value.trim();

      if (!text) {
        setStatus('文言を入力してください。', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        setStatus('クリップボードへの登録に失敗しました。ブラウザ権限を確認してください。', 'error');
        return;
      }

      try {
        const response = await fetch(CLIPBOARD_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ str: text })
        });
        const payload = await parseJsonSafely(response);
        if (!response.ok) {
          const message = payload && payload.error ? payload.error : '登録に失敗しました。';
          throw new Error(message);
        }
      } catch (error) {
        const message = error instanceof Error ? error.message : '登録に失敗しました。';
        setStatus(message, 'error');
        return;
      }

      setStatus('登録しました。', 'ok');
      form.reset();
      messageInput.focus();
    });
  </script>
</body>
</html>
