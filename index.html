<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Live Dashboard</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --surface: #ffffff;
      --border: #d8d3c8;
      --text: #111111;
      --muted: #6b6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }

    main {
      width: min(1100px, 94vw);
      margin: 2rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
    }

    .meta {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 0.7rem;
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      background: #faf7f1;
      font-size: 0.84rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <div>
        <h1>クリップボード投稿 リアルタイム一覧</h1>
        <p class="meta">3秒ポーリングで更新 / 投稿ページ: <a href="/question">/question</a></p>
      </div>
      <div class="mono" id="last-updated">最終更新: -</div>
    </div>

    <div class="table-wrap">
      <table aria-label="Clipboard submissions">
        <thead>
          <tr>
            <th style="width: 70px;">No.</th>
            <th style="width: 190px;">投稿時刻</th>
            <th>文言</th>
            <th style="width: 180px;">ID</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'clipboard-submissions-v1';
    const POLL_INTERVAL_MS = 3000;
    const rows = document.getElementById('rows');
    const lastUpdated = document.getElementById('last-updated');
    let previousSnapshot = '';
    let pollTimer = null;

    const loadItems = () => {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    };

    const formatDateTime = (isoString) => {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return '-';
      return new Intl.DateTimeFormat('ja-JP', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      }).format(date);
    };

    const render = () => {
      const items = loadItems();
      const snapshot = JSON.stringify(items);
      if (snapshot === previousSnapshot) {
        lastUpdated.textContent = `最終更新: ${formatDateTime(new Date().toISOString())}`;
        return;
      }
      previousSnapshot = snapshot;

      const sortedItems = items
        .slice()
        .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

      rows.innerHTML = '';

      if (sortedItems.length === 0) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 4;
        td.textContent = '投稿はまだありません。';
        tr.appendChild(td);
        rows.appendChild(tr);
      } else {
        sortedItems.forEach((item, index) => {
          const tr = document.createElement('tr');

          const no = document.createElement('td');
          no.textContent = String(index + 1);

          const createdAt = document.createElement('td');
          createdAt.textContent = formatDateTime(item.createdAt);

          const text = document.createElement('td');
          text.textContent = String(item.text || '');

          const id = document.createElement('td');
          id.className = 'mono';
          id.textContent = String(item.id || '-');

          tr.appendChild(no);
          tr.appendChild(createdAt);
          tr.appendChild(text);
          tr.appendChild(id);
          rows.appendChild(tr);
        });
      }

      lastUpdated.textContent = `最終更新: ${formatDateTime(new Date().toISOString())}`;
    };

    const startPolling = () => {
      if (!pollTimer) pollTimer = window.setInterval(render, POLL_INTERVAL_MS);
    };

    const stopPolling = () => {
      if (!pollTimer) return;
      window.clearInterval(pollTimer);
      pollTimer = null;
    };

    render();
    startPolling();
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopPolling();
      else {
        render();
        startPolling();
      }
    });
    window.addEventListener('storage', render);
  </script>
</body>
</html>
