<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Live Dashboard</title>
  <style>
    :root {
      --bg: #83d3e2;
      --surface: #ffffff;
      --border: #d8d3c8;
      --text: #111111;
      --muted: #6b6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }

    main {
      width: min(1100px, 94vw);
      margin: 2rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
    }

    .meta {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 0.7rem;
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      background: #faf7f1;
      font-size: 0.84rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .comment-cell {
      max-width: 560px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-btn {
      border: 1px solid #111;
      background: #fff;
      color: #111;
      border-radius: 6px;
      padding: 0.3rem 0.55rem;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #111;
      color: #fff;
    }

    .delete-btn:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <div>
        <h1>やってみなはれボックス</h1>
        <p class="meta">1秒ポーリングで更新 / 投稿ページ: <a href="/question">/question</a></p>
      </div>
    </div>

    <div class="table-wrap">
      <table aria-label="Clipboard submissions">
        <thead>
          <tr>
            <th style="width: 70px;">No.</th>
            <th style="width: 190px;">投稿時刻</th>
            <th>コメント</th>
            <th style="width: 100px;">操作</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <script>
    const CLIPBOARD_API_URL = 'https://githubio-api.vercel.app/api/v1/clipboards';
    const POLL_INTERVAL_MS = 1000;
    const rows = document.getElementById('rows');
    let previousSnapshot = '';
    let pollTimer = null;

    const parseJsonSafely = async (response) => {
      try {
        return await response.json();
      } catch {
        return null;
      }
    };

    const normalizeItems = (payload) => {
      if (!Array.isArray(payload)) return [];
      return payload
        .map((entry, index) => {
          if (typeof entry === 'string') {
            return {
              id: `text-${index}`,
              text: entry,
              createdAt: ''
            };
          }

          if (entry && typeof entry === 'object') {
            const text = typeof entry.text === 'string'
              ? entry.text
              : (typeof entry.str === 'string' ? entry.str : '');
            if (!text) return null;
            return {
              id: String(entry.id || entry._id || `${index}-${text}`),
              text,
              createdAt: String(entry.createdAt || entry.created_at || '')
            };
          }

          return null;
        })
        .filter(Boolean);
    };

    const formatDateTime = (isoString) => {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return '-';
      return new Intl.DateTimeFormat('ja-JP', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      }).format(date);
    };

    const deleteClipboardEntry = async (text) => {
      const candidates = [
        {
          url: CLIPBOARD_API_URL,
          init: {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ str: text })
          }
        },
        {
          url: CLIPBOARD_API_URL,
          init: {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
          }
        },
        {
          url: `${CLIPBOARD_API_URL}?str=${encodeURIComponent(text)}`,
          init: { method: 'DELETE' }
        }
      ];

      let lastError = '削除に失敗しました。';

      for (const candidate of candidates) {
        let response;
        let payload;

        try {
          response = await fetch(candidate.url, candidate.init);
          payload = await parseJsonSafely(response);
        } catch {
          continue;
        }

        if (response.ok) return;
        if (response.status >= 500) break;
        lastError = payload && payload.error ? payload.error : lastError;
      }

      throw new Error(`削除に失敗しました。(${lastError})`);
    };

    const render = (items) => {
      const snapshot = JSON.stringify(items);
      if (snapshot === previousSnapshot) return;
      previousSnapshot = snapshot;

      const sortedItems = items
        .slice()
        .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

      rows.innerHTML = '';

      if (sortedItems.length === 0) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 4;
        td.textContent = '投稿はまだありません。';
        tr.appendChild(td);
        rows.appendChild(tr);
      } else {
        sortedItems.forEach((item, index) => {
          const tr = document.createElement('tr');

          const no = document.createElement('td');
          no.textContent = String(index + 1);

          const createdAt = document.createElement('td');
          createdAt.textContent = formatDateTime(item.createdAt);

          const text = document.createElement('td');
          text.className = 'comment-cell';
          text.textContent = String(item.text || '');
          text.title = String(item.text || '');

          const action = document.createElement('td');
          const deleteBtn = document.createElement('button');
          deleteBtn.type = 'button';
          deleteBtn.className = 'delete-btn';
          deleteBtn.textContent = '削除';
          deleteBtn.addEventListener('click', async () => {
            if (!window.confirm('このコメントを削除しますか？')) return;
            deleteBtn.disabled = true;
            try {
              await deleteClipboardEntry(String(item.text || ''));
              await loadAndRender();
            } catch (error) {
              const message = error instanceof Error ? error.message : '削除に失敗しました。';
              window.alert(message);
              deleteBtn.disabled = false;
            }
          });
          action.appendChild(deleteBtn);

          tr.appendChild(no);
          tr.appendChild(createdAt);
          tr.appendChild(text);
          tr.appendChild(action);
          rows.appendChild(tr);
        });
      }
    };

    const loadAndRender = async () => {
      try {
        const response = await fetch(CLIPBOARD_API_URL, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        const payload = await parseJsonSafely(response);
        if (!response.ok) throw new Error('取得に失敗しました。');
        render(normalizeItems(payload));
      } catch {
        render([]);
      }
    };

    const startPolling = () => {
      if (!pollTimer) pollTimer = window.setInterval(loadAndRender, POLL_INTERVAL_MS);
    };

    const stopPolling = () => {
      if (!pollTimer) return;
      window.clearInterval(pollTimer);
      pollTimer = null;
    };

    loadAndRender();
    startPolling();
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopPolling();
      else {
        loadAndRender();
        startPolling();
      }
    });
  </script>
</body>
</html>
