<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Live Dashboard</title>
  <style>
    :root {
      --bg: #83d3e2;
      --surface: #ffffff;
      --border: #d8d3c8;
      --text: #111111;
      --muted: #6b6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }

    main {
      width: min(1100px, 94vw);
      margin: 2rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 0.7rem;
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      background: #faf7f1;
      font-size: 0.84rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .comment-cell {
      max-width: 560px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-btn {
      border: 1px solid #111;
      background: #fff;
      color: #111;
      border-radius: 6px;
      padding: 0.3rem 0.55rem;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .row-btn:hover {
      background: #111;
      color: #fff;
    }

    .row-btn:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .modal {
      width: min(720px, calc(100vw - 2rem));
      max-height: calc(100vh - 2rem);
      border: 0;
      border-radius: 18px;
      padding: 0;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
    }

    .modal::backdrop {
      background: rgba(0, 0, 0, 0.48);
    }

    .modal-content {
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      margin: 0;
      font-size: 1rem;
    }

    .modal-close {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      font: inherit;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
    }

    .modal-body {
      max-height: min(65vh, 520px);
      overflow: auto;
      padding: 1.2rem;
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .col-no,
    .cell-no,
    .col-detail,
    .cell-detail,
    .col-action,
    .cell-action {
      white-space: nowrap;
    }

    .cell-detail,
    .cell-action {
      text-align: center;
    }

    @media (max-width: 640px) {
      main {
        width: auto;
        margin: 0.5rem;
        padding: 0.8rem;
      }

      h1 {
        font-size: 1.1rem;
      }

      th,
      td {
        padding: 0.55rem;
        font-size: 0.84rem;
      }

      th {
        font-size: 0.74rem;
      }

      table {
        min-width: 540px;
      }

      .comment-cell {
        max-width: none;
      }

      .row-btn {
        min-width: 4.9rem;
        padding: 0.35rem 0.5rem;
        font-size: 0.76rem;
      }

      .modal {
        width: calc(100vw - 1rem);
        max-height: calc(100vh - 1rem);
      }

      .modal-header {
        padding: 0.85rem 1rem;
      }

      .modal-body {
        max-height: 70vh;
        padding: 1rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <div>
        <h1>やってみなはれボックス</h1>
      </div>
    </div>

    <div class="table-wrap">
      <table aria-label="Clipboard submissions">
        <thead>
          <tr>
            <th class="col-no" style="width: 70px;">No.</th>
            <th>コメント</th>
            <th class="col-detail" style="width: 110px;" aria-label="全文表示"></th>
            <th class="col-action" style="width: 100px;">操作</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <dialog id="message-modal" class="modal" aria-labelledby="message-modal-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="message-modal-title" class="modal-title">コメント全文</h2>
        <button type="button" id="message-modal-close" class="modal-close" aria-label="閉じる">×</button>
      </div>
      <div id="message-modal-body" class="modal-body"></div>
    </div>
  </dialog>

  <script>
    const CLIPBOARD_API_URL = 'https://githubio-api.vercel.app/api/v1/clipboards';
    const POLL_INTERVAL_MS = 1000;
    const rows = document.getElementById('rows');
    const messageModal = document.getElementById('message-modal');
    const messageModalBody = document.getElementById('message-modal-body');
    const messageModalClose = document.getElementById('message-modal-close');
    let previousSnapshot = '';
    let pollTimer = null;

    const parseJsonSafely = async (response) => {
      try {
        return await response.json();
      } catch {
        return null;
      }
    };

    const normalizeItems = (payload) => {
      if (!Array.isArray(payload)) return [];
      return payload
        .map((entry, index) => {
          if (typeof entry === 'string') {
            return {
              id: `text-${index}`,
              text: entry,
              createdAt: ''
            };
          }

          if (entry && typeof entry === 'object') {
            const text = typeof entry.text === 'string'
              ? entry.text
              : (typeof entry.str === 'string' ? entry.str : '');
            if (!text) return null;
            return {
              id: String(entry.id || entry._id || `${index}-${text}`),
              text,
              createdAt: String(entry.createdAt || entry.created_at || '')
            };
          }

          return null;
        })
        .filter(Boolean);
    };

    const deleteClipboardEntry = async (text) => {
      const candidates = [
        {
          url: CLIPBOARD_API_URL,
          init: {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ str: text })
          }
        },
        {
          url: CLIPBOARD_API_URL,
          init: {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
          }
        },
        {
          url: `${CLIPBOARD_API_URL}?str=${encodeURIComponent(text)}`,
          init: { method: 'DELETE' }
        }
      ];

      let lastError = '削除に失敗しました。';

      for (const candidate of candidates) {
        let response;
        let payload;

        try {
          response = await fetch(candidate.url, candidate.init);
          payload = await parseJsonSafely(response);
        } catch {
          continue;
        }

        if (response.ok) return;
        if (response.status >= 500) break;
        lastError = payload && payload.error ? payload.error : lastError;
      }

      throw new Error(`削除に失敗しました。(${lastError})`);
    };

    const openMessageModal = (text) => {
      messageModalBody.textContent = text;
      messageModalBody.scrollTop = 0;
      if (typeof messageModal.showModal === 'function') {
        if (!messageModal.open) messageModal.showModal();
        return;
      }
      window.alert(text);
    };

    const closeMessageModal = () => {
      if (messageModal.open) messageModal.close();
    };

    messageModalClose.addEventListener('click', closeMessageModal);
    messageModal.addEventListener('click', (event) => {
      const bounds = messageModal.getBoundingClientRect();
      const clickedInside =
        event.clientX >= bounds.left &&
        event.clientX <= bounds.right &&
        event.clientY >= bounds.top &&
        event.clientY <= bounds.bottom;
      if (!clickedInside) closeMessageModal();
    });

    const render = (items) => {
      const snapshot = JSON.stringify(items);
      if (snapshot === previousSnapshot) return;
      previousSnapshot = snapshot;

      const sortedItems = items
        .slice()
        .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

      rows.innerHTML = '';

      if (sortedItems.length === 0) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 4;
        td.textContent = '投稿はまだありません。';
        tr.appendChild(td);
        rows.appendChild(tr);
      } else {
        sortedItems.forEach((item, index) => {
          const tr = document.createElement('tr');

          const no = document.createElement('td');
          no.className = 'cell-no mono';
          no.textContent = String(index + 1);

          const text = document.createElement('td');
          text.className = 'comment-cell';
          text.textContent = String(item.text || '');
          text.title = String(item.text || '');

          const detail = document.createElement('td');
          detail.className = 'cell-detail';
          const viewBtn = document.createElement('button');
          viewBtn.type = 'button';
          viewBtn.className = 'row-btn';
          viewBtn.textContent = '全て見る';
          viewBtn.addEventListener('click', () => {
            openMessageModal(String(item.text || ''));
          });
          detail.appendChild(viewBtn);

          const action = document.createElement('td');
          action.className = 'cell-action';
          const deleteBtn = document.createElement('button');
          deleteBtn.type = 'button';
          deleteBtn.className = 'row-btn';
          deleteBtn.textContent = '削除';
          deleteBtn.addEventListener('click', async () => {
            if (!window.confirm('このコメントを削除しますか？')) return;
            deleteBtn.disabled = true;
            try {
              await deleteClipboardEntry(String(item.text || ''));
              await loadAndRender();
            } catch (error) {
              const message = error instanceof Error ? error.message : '削除に失敗しました。';
              window.alert(message);
              deleteBtn.disabled = false;
            }
          });
          action.appendChild(deleteBtn);

          tr.appendChild(no);
          tr.appendChild(text);
          tr.appendChild(detail);
          tr.appendChild(action);
          rows.appendChild(tr);
        });
      }
    };

    const loadAndRender = async () => {
      try {
        const response = await fetch(CLIPBOARD_API_URL, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        const payload = await parseJsonSafely(response);
        if (!response.ok) throw new Error('取得に失敗しました。');
        render(normalizeItems(payload));
      } catch {
        render([]);
      }
    };

    const startPolling = () => {
      if (!pollTimer) pollTimer = window.setInterval(loadAndRender, POLL_INTERVAL_MS);
    };

    const stopPolling = () => {
      if (!pollTimer) return;
      window.clearInterval(pollTimer);
      pollTimer = null;
    };

    loadAndRender();
    startPolling();
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopPolling();
      else {
        loadAndRender();
        startPolling();
      }
    });
  </script>
</body>
</html>
