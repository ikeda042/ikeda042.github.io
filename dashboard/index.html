<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Redirect</title>
    <meta http-equiv="refresh" content="0; url=/dashboard.html" />
    <link rel="canonical" href="/dashboard.html" />
    <script>
        window.location.replace(`/dashboard.html${window.location.search}${window.location.hash}`);
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            color: #111111;
            background: #f6f2ea;
        }

        main {
            width: min(480px, 100%);
            padding: 1.5rem;
            border: 2px solid #111111;
            background: rgba(255, 255, 255, 0.92);
            text-align: center;
            line-height: 1.8;
        }

        a {
            color: inherit;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <p>`/dashboard` から `dashboard.html` へ移動します。</p>
        <p>自動で切り替わらない場合は <a href="/dashboard.html">こちら</a> を開いてください。</p>
    </main>
</body>
</html>
