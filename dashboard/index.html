<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Redirect</title>
    <meta http-equiv="refresh" content="0; url=/dashboard.html" />
    <link rel="canonical" href="/dashboard.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <script>
      window.location.replace(
        `/dashboard.html${window.location.search}${window.location.hash}`,
      );
    </script>
    <style>
      :root {
        --bg-color: #07111f;
        --text-color: #f4f7fb;
        --muted-color: #a7b7cc;
        --border-color: rgba(255, 255, 255, 0.12);
        --accent-color: #77d0ff;
        --shadow-color: rgba(2, 8, 23, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        font-family: "Noto Sans JP", sans-serif;
        color: var(--text-color);
        background:
          radial-gradient(
            circle at top left,
            rgba(119, 208, 255, 0.18),
            transparent 28%
          ),
          linear-gradient(180deg, #08111d 0%, #0b1830 46%, #07111f 100%);
        -webkit-font-smoothing: antialiased;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.045) 1px,
            transparent 1px
          );
        background-size: 30px 30px;
        mask-image: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.42),
          transparent 85%
        );
        pointer-events: none;
        opacity: 0.32;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(520px, 100%);
        padding: 1.6rem;
        border: 1px solid var(--border-color);
        border-radius: 28px;
        background: rgba(10, 20, 35, 0.8);
        box-shadow: 0 28px 70px var(--shadow-color);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 0.6rem;
        color: var(--accent-color);
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 0.85rem;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(2rem, 7vw, 3rem);
        line-height: 1;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        color: var(--muted-color);
        line-height: 1.8;
      }

      p + p {
        margin-top: 0.8rem;
      }

      a {
        color: var(--text-color);
        font-weight: 700;
        text-decoration: none;
        border-bottom: 1px solid rgba(119, 208, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Redirect</p>
      <h1>Dashboard</h1>
      <p>`/dashboard` から `dashboard.html` へ移動します。</p>
      <p>
        自動で切り替わらない場合は
        <a href="/dashboard.html">こちら</a> を開いてください。
      </p>
    </main>
  </body>
</html>
