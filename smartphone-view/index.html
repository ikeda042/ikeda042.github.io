<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>やってみなはれ 掲示板</title>
  <style>
    :root {
      --bg: #83d3e2;
      --surface: #ffffff;
      --border: #d8d3c8;
      --text: #111111;
      --muted: #6b6b6b;
      --hover: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      width: min(100%, 600px);
      margin: 0 auto;
      background: var(--surface);
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .feed {
      display: flex;
      flex-direction: column;
      padding-bottom: 5rem;
    }

    .post {
      display: flex;
      gap: 0.8rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      transition: background-color 0.2s;
    }

    .post:active {
      background-color: var(--hover);
    }

    .post-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e5e5e5;
      color: var(--text);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .avatar svg {
      width: 24px;
      height: 24px;
    }

    .thread-line {
      flex-grow: 1;
      width: 2px;
      background: var(--border);
      margin-top: 0.5rem;
      margin-bottom: 0.2rem;
      border-radius: 2px;
    }

    .post-right {
      flex-grow: 1;
      min-width: 0;
    }

    .post-header {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      margin-bottom: 0.25rem;
    }

    .post-header time {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .text {
      margin: 0 0 0.8rem;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .like-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: transparent;
      border: none;
      padding: 0;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s, color 0.2s;
    }

    .like-btn:hover {
      opacity: 1;
    }

    .like-btn.is-liked {
      color: #e0245e;
      opacity: 1;
    }

    .like-btn[disabled] {
      cursor: wait;
      opacity: 0.4;
    }

    .empty,
    .status {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .sentinel {
      height: 1px;
    }

    .fab {
      position: fixed;
      right: 1.5rem;
      bottom: 1.5rem;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 1.25rem;
      min-height: 50px;
      border-radius: 999px;
      background: var(--text);
      color: #ffffff;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      font-weight: bold;
    }

    @media (min-width: 640px) {
      .app {
        margin: 2rem auto;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        min-height: calc(100vh - 4rem);
        border: 1px solid var(--border);
      }
      .hero {
        border-radius: 16px 16px 0 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>やってみなはれ 掲示板</h1>
      <div class="summary">
        <span id="summary-count">読み込み中...</span>
        <span>最新順</span>
      </div>
    </header>

    <main class="feed" id="feed" aria-live="polite"></main>
    <div id="empty" class="empty" hidden>投稿はまだありません。</div>
    <div id="status" class="status">読み込み中...</div>
    <div id="sentinel" class="sentinel" aria-hidden="true"></div>
  </div>

  <a class="fab" href="/question">コメントを書く</a>

  <script>
    const CLIPBOARD_API_URL = 'https://githubio-api.vercel.app/api/v1/clipboards';
    const CLIPBOARD_DETAIL_API_URL = `${CLIPBOARD_API_URL}?detail=1`;
    const LIKE_STORAGE_KEY = 'clipboard-like-states-v1';
    const LIKE_STATE_LIKED = 'liked';
    const LIKE_STATE_UNLIKED = 'unliked';
    const INITIAL_BATCH_SIZE = 8;
    const BATCH_SIZE = 6;
    const POLL_INTERVAL_MS = 5000;

    const feed = document.getElementById('feed');
    const empty = document.getElementById('empty');
    const statusEl = document.getElementById('status');
    const sentinel = document.getElementById('sentinel');
    const summaryCount = document.getElementById('summary-count');

    let allItems = [];
    let visibleCount = 0;
    let previousSnapshot = '';
    let pollTimer = null;
    let observer = null;
    let hasAttemptedLegacyUnlikeSync = false;
    let likeStateMap = loadLikeStateMap();

    const dateFormatter = new Intl.DateTimeFormat('ja-JP', {
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    const parseJsonSafely = async (response) => {
      try {
        return await response.json();
      } catch {
        return null;
      }
    };

    function loadLikeStateMap() {
      try {
        const raw = window.localStorage.getItem(LIKE_STORAGE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    const saveLikeStateMap = () => {
      try {
        window.localStorage.setItem(LIKE_STORAGE_KEY, JSON.stringify(likeStateMap));
      } catch {
        // localStorage unavailable.
      }
    };

    const getLikeState = (id) => {
      const value = likeStateMap[String(id)];
      return value === LIKE_STATE_LIKED || value === LIKE_STATE_UNLIKED ? value : null;
    };

    const setLikeState = (id, state) => {
      if (state === LIKE_STATE_LIKED || state === LIKE_STATE_UNLIKED) {
        likeStateMap[String(id)] = state;
      } else {
        delete likeStateMap[String(id)];
      }
      saveLikeStateMap();
    };

    const clearLikeState = (id) => {
      delete likeStateMap[String(id)];
      saveLikeStateMap();
    };

    const normalizeItems = (payload) => {
      if (!Array.isArray(payload)) return [];
      return payload
        .map((entry, index) => {
          if (!entry || typeof entry !== 'object') return null;

          const text = typeof entry.text === 'string'
            ? entry.text
            : (typeof entry.str === 'string' ? entry.str : '');
          if (!text) return null;

          const rawId = entry.id ?? entry._id ?? `${index}-${text}`;
          const numericId = Number(rawId);
          const normalizedId =
            Number.isInteger(numericId) && numericId > 0
              ? numericId
              : String(rawId);
          const rawLikeCount = Number(entry.like_count ?? entry.likeCount ?? 0);

          return {
            id: normalizedId,
            text,
            createdAt: String(entry.createdAt || entry.created_at || ''),
            likeCount:
              Number.isFinite(rawLikeCount) && rawLikeCount > 0
                ? Math.floor(rawLikeCount)
                : 0
          };
        })
        .filter(Boolean)
        .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    };

    const formatCreatedAt = (value) => {
      if (!value) return '投稿時刻なし';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return dateFormatter.format(date);
    };

    const getDisplayedLikeCount = (item) => {
      const likeState = getLikeState(item.id);
      if (likeState === LIKE_STATE_UNLIKED) {
        return Math.max(0, Number(item.likeCount || 0) - 1);
      }
      return Math.max(0, Number(item.likeCount || 0));
    };

    const applyLikeCount = (items, id, count, fallbackDelta) => items.map((item) => {
      if (item.id !== id) return item;

      const fallbackCount = Math.max(0, Number(item.likeCount || 0) + fallbackDelta);
      return {
        ...item,
        likeCount: Number.isFinite(count) ? Math.max(0, count) : fallbackCount
      };
    });

    const updateClipboardLike = async (id, action) => {
      const response = await fetch(CLIPBOARD_API_URL, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action })
      });
      const payload = await parseJsonSafely(response);

      if (!response.ok) {
        const message = payload && payload.error
          ? payload.error
          : (action === 'decrement' ? 'いいね解除に失敗しました。' : 'いいねに失敗しました。');
        throw new Error(message);
      }

      return payload;
    };

    const syncLegacyUnlikeStates = async (items) => {
      if (hasAttemptedLegacyUnlikeSync) return items;
      hasAttemptedLegacyUnlikeSync = true;

      const targets = items.filter(
        (item) => typeof item.id === 'number' && getLikeState(item.id) === LIKE_STATE_UNLIKED
      );
      if (targets.length === 0) return items;

      let nextItems = items;

      for (const item of targets) {
        try {
          const payload = await updateClipboardLike(item.id, 'decrement');
          const nextCount = Number(payload && payload.count);
          nextItems = applyLikeCount(nextItems, item.id, nextCount, -1);
          clearLikeState(item.id);
        } catch {
          // Keep the legacy local state when reconciliation fails.
        }
      }

      return nextItems;
    };

    const setStatus = (message) => {
      statusEl.textContent = message;
    };

    const render = () => {
      const visibleItems = allItems.slice(0, visibleCount);
      const hasMore = visibleCount < allItems.length;
      const snapshot = JSON.stringify(
        visibleItems.map((item) => ({
          id: item.id,
          text: item.text,
          createdAt: item.createdAt,
          likeCount: item.likeCount,
          likeState: getLikeState(item.id)
        }))
      ) + `|${visibleCount}|${allItems.length}`;

      summaryCount.textContent = `${allItems.length}件のやってみなはれ`;
      empty.hidden = allItems.length > 0;
      feed.hidden = allItems.length === 0;

      if (allItems.length === 0) {
        setStatus('まだ投稿がありません。');
        sentinel.hidden = true;
        if (snapshot !== previousSnapshot) {
          previousSnapshot = snapshot;
          feed.innerHTML = '';
        }
        return;
      }

      sentinel.hidden = !hasMore;
      setStatus(hasMore ? '下へスクロールすると続きを表示します。' : 'ここまでで最新分をすべて表示しています。');

      if (snapshot === previousSnapshot) return;
      previousSnapshot = snapshot;
      feed.innerHTML = '';

      visibleItems.forEach((item, index) => {
        const post = document.createElement('article');
        post.className = 'post';

        // Left Column (Avatar + Thread line)
        const leftCol = document.createElement('div');
        leftCol.className = 'post-left';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.setAttribute('aria-hidden', 'true');
        avatar.innerHTML = '<svg viewBox="0 0 24 24" focusable="false"><path d="M12 12a4 4 0 1 0-4-4a4 4 0 0 0 4 4Zm0 2c-3.314 0-6 2.239-6 5v1h12v-1c0-2.761-2.686-5-6-5Z" fill="currentColor"/></svg>';

        leftCol.appendChild(avatar);

        // Add thread line if it's not the last loaded item
        if (index < visibleItems.length - 1) {
          const threadLine = document.createElement('div');
          threadLine.className = 'thread-line';
          leftCol.appendChild(threadLine);
        }

        // Right Column (Content)
        const rightCol = document.createElement('div');
        rightCol.className = 'post-right';

        const header = document.createElement('div');
        header.className = 'post-header';

        const time = document.createElement('time');
        time.textContent = formatCreatedAt(item.createdAt);

        header.appendChild(time);

        const text = document.createElement('p');
        text.className = 'text';
        text.textContent = String(item.text || '');

        const actions = document.createElement('div');
        actions.className = 'post-actions';

        const likeBtn = document.createElement('button');
        likeBtn.type = 'button';
        likeBtn.className = 'like-btn';

        const likeState = getLikeState(item.id);
        const isLiked = likeState === LIKE_STATE_LIKED;
        
        const likeIcon = isLiked ? '♥' : '♡';
        likeBtn.textContent = `${likeIcon} ${getDisplayedLikeCount(item)}`;
        likeBtn.setAttribute('aria-pressed', isLiked ? 'true' : 'false');
        if (isLiked) likeBtn.classList.add('is-liked');
        if (typeof item.id !== 'number') {
          likeBtn.disabled = true;
          likeBtn.title = 'いいね対象のIDがありません。';
        }

        likeBtn.addEventListener('click', async () => {
          const currentState = getLikeState(item.id);

          if (typeof item.id !== 'number') {
            window.alert('いいね対象のIDを取得できません。');
            return;
          }

          if (currentState === LIKE_STATE_UNLIKED) {
            setLikeState(item.id, LIKE_STATE_LIKED);
            render();
            return;
          }

          const action = currentState === LIKE_STATE_LIKED ? 'decrement' : 'increment';

          likeBtn.disabled = true;
          try {
            const payload = await updateClipboardLike(item.id, action);
            const nextCount = Number(payload && payload.count);
            allItems = applyLikeCount(
              allItems,
              item.id,
              nextCount,
              action === 'decrement' ? -1 : 1
            );
            if (action === 'decrement') {
              clearLikeState(item.id);
            } else {
              setLikeState(item.id, LIKE_STATE_LIKED);
            }
            render();
          } catch (error) {
            const message = error instanceof Error
              ? error.message
              : (action === 'decrement' ? 'いいね解除に失敗しました。' : 'いいねに失敗しました。');
            window.alert(message);
            likeBtn.disabled = false;
          }
        });

        actions.appendChild(likeBtn);

        rightCol.appendChild(header);
        rightCol.appendChild(text);
        rightCol.appendChild(actions);

        post.appendChild(leftCol);
        post.appendChild(rightCol);
        feed.appendChild(post);
      });
    };

    const expandVisibleItems = () => {
      if (visibleCount >= allItems.length) return;
      visibleCount = Math.min(allItems.length, visibleCount + BATCH_SIZE);
      render();
    };

    const ensureObserver = () => {
      if (observer || !('IntersectionObserver' in window)) return;
      observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) expandVisibleItems();
        });
      }, {
        rootMargin: '320px 0px 320px 0px'
      });
      observer.observe(sentinel);
    };

    const loadFeed = async ({ preserveVisibleCount } = {}) => {
      try {
        const response = await fetch(CLIPBOARD_DETAIL_API_URL, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        const payload = await parseJsonSafely(response);
        if (!response.ok) throw new Error('取得に失敗しました。');

        const nextItems = await syncLegacyUnlikeStates(normalizeItems(payload));
        const wasShowingAll = visibleCount >= allItems.length;
        allItems = nextItems;

        if (allItems.length === 0) {
          visibleCount = 0;
        } else if (preserveVisibleCount && visibleCount > 0) {
          visibleCount = wasShowingAll
            ? allItems.length
            : Math.min(allItems.length, Math.max(visibleCount, INITIAL_BATCH_SIZE));
        } else {
          visibleCount = Math.min(allItems.length, INITIAL_BATCH_SIZE);
        }

        render();
      } catch {
        allItems = [];
        visibleCount = 0;
        render();
        setStatus('読み込みに失敗しました。少し待ってから再読み込みしてください。');
      }
    };

    const startPolling = () => {
      if (!pollTimer) {
        pollTimer = window.setInterval(() => {
          loadFeed({ preserveVisibleCount: true });
        }, POLL_INTERVAL_MS);
      }
    };

    const stopPolling = () => {
      if (!pollTimer) return;
      window.clearInterval(pollTimer);
      pollTimer = null;
    };

    ensureObserver();
    loadFeed({ preserveVisibleCount: false });
    startPolling();

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopPolling();
      } else {
        loadFeed({ preserveVisibleCount: true });
        startPolling();
      }
    });
  </script>
</body>
</html>
